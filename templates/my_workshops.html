{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1>My Workshops</h1>
</div>

<div class="table-card">
    <table>
        <thead>
            <tr>
                <th>Workshop</th>
                <th>Status</th>
                <th>Feedback</th>
            </tr>
        </thead>
        <tbody>
            {% for registration in registrations %}
            <tr>
                <td>{{ registration.workshop.title }}</td>
                <td>{{ registration.status }}</td>
                <td>
                    <a class="btn btn-small" href="{{ url_for('submit_feedback', workshop_id=registration.workshop.id) }}">
                        Give Feedback
                    </a>
                </td>
            </tr>
            {% else %}
            <tr><td colspan="3">No workshop registrations found.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
